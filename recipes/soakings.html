    <h2>Jollof</h2>

    <p>This is a quick snack, or a life saver</p>

    <h2>Ingredients</h2>

    <ul>
        <li>Gari</li>
        <li>Sugar</li>
        <li>Milk</li>
        <li>Groundnuts</li>
    </ul>

    <h2>Steps</h2>

    <ol>
        <li>Fill a bowl with 5 tablespoons of Gari</li>
        <li>Add Sugar, Groundnuts, and Milk</li>
        <li>Stir and add ice cubes</li>
        <li>Serve</li>
    </ol>
